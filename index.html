<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Darren Billy | Portfolio</title>
    <style>
      :root {
        --bg: #0b1220;
        --text: #e8eefc;
        --muted: #b9c4e3;
        --link: #7dd3fc;
        --border: rgba(255, 255, 255, 0.12);
        --card: rgba(17, 26, 46, 0.88);
      }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        background:
          radial-gradient(1200px 800px at 20% 10%, #1b2a4a 0%, transparent 55%),
          radial-gradient(900px 700px at 80% 20%, #2a1b4a 0%, transparent 55%),
          var(--bg);
        color: var(--text);
      }
      .container {
        max-width: 980px;
        margin: 0 auto;
        padding: 28px 18px 60px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 18px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      }
      header {
        display: grid;
        grid-template-columns: 120px 1fr;
        gap: 18px;
        align-items: center;
      }
      img.avatar {
        width: 120px;
        height: 120px;
        object-fit: cover;
        border-radius: 18px;
        border: 1px solid var(--border);
      }
      h1 { margin: 0; font-size: 28px; }
      .tagline { margin: 6px 0 0; color: var(--muted); }
      a { color: var(--link); text-decoration: none; }
      a:hover { text-decoration: underline; }
      section { margin-top: 18px; }
      h2 { margin: 0 0 10px; font-size: 18px; }
      ul { margin: 0; padding-left: 18px; color: var(--muted); }
      li { margin: 6px 0; }
      .small { color: var(--muted); font-size: 13px; margin-top: 10px; }
      footer { margin-top: 18px; color: var(--muted); font-size: 13px; }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="card">
        <header>
          <img class="avatar" src="1757386157504.jpg" alt="Profile photo" />
          <div>
            <h1>Darren Billy</h1>
            <p class="tagline">Aspiring AI Engineer • Full-Stack Developer • Builder</p>

            <p class="small">
              GitHub:
              <a href="https://github.com/stacktech4024" target="_blank" rel="noreferrer">
                github.com/stacktech4024
              </a>
            </p>
          </div>
        </header>

        <section>
          <h2>Featured Projects</h2>
          <ul>
            <li>
              <a href="https://github.com/stacktech4024/OOP-3-Final-Project-Unity" target="_blank" rel="noreferrer">
                OOP-3-Final-Project-Unity
              </a>
            </li>
            <li>
              <a href="https://github.com/stacktech4024/Screen-Shot-Extractor" target="_blank" rel="noreferrer">
                Screen-Shot-Extractor
              </a>
            </li>
          </ul>
          <p class="small">Only public projects are linked.</p>
        </section>

        <footer>Last updated: 2026-03-21</footer>
      </div>
    </div>
  </body>
</html>
